worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    sendfile on;
    keepalive_timeout 65;

    # Map request method to flag (evaluated at rewrite time)
    map $request_method $is_options {
        "OPTIONS"   1;
        default     0;
    }

    # Map URI prefix to upstream backend
    map $uri $api_backend {
        ~^/api/auth/       "http://host.docker.internal:8080";
        ~^/api/user/       "http://host.docker.internal:8080";
        ~^/api/tasks/      "http://host.docker.internal:8081";
        ~^/api/paths/      "http://host.docker.internal:8082";
        ~^/api/knowledge/  "http://host.docker.internal:8083";
        ~^/api/ai/         "http://host.docker.internal:8084";
        default             "http://host.docker.internal:8080";
    }

    server {
        listen 80;
        server_name localhost;

        # Health check
        location = /health {
            access_log off;
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }

        # OPTIONS preflight — rewrite to internal proxy location
        location ~ ^/api/(.*)$ {
            if ($is_options = 1) {
                rewrite ^ /cors-internal/$1?$args break;
            }
            # Non-OPTIONS: proxy directly using variable (variable-based proxy_pass evaluated last)
            proxy_pass http://host.docker.internal:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Internal locations for preflight proxying
        location ~ ^/cors-internal/auth/ {
            internal;
            proxy_pass http://host.docker.internal:8080/auth/$1;
        }
        location ~ ^/cors-internal/user/ {
            internal;
            proxy_pass http://host.docker.internal:8080/user/$1;
        }
        location ~ ^/cors-internal/tasks/ {
            internal;
            proxy_pass http://host.docker.internal:8081/tasks/$1;
        }
        location ~ ^/cors-internal/paths/ {
            internal;
            proxy_pass http://host.docker.internal:8082/paths/$1;
        }
        location ~ ^/cors-internal/knowledge/ {
            internal;
            proxy_pass http://host.docker.internal:8083/knowledge/$1;
        }
        location ~ ^/cors-internal/ai/ {
            internal;
            proxy_pass http://host.docker.internal:8084/ai/$1;
        }

        # Catch-all — return 404 for unknown API routes
        location /api/ {
            return 404 '{"code":404,"message":"Not Found","data":null}';
            add_header Content-Type application/json;
        }

        # Default
        location / {
            return 404 '{"code":404,"message":"Not Found","data":null}';
            add_header Content-Type application/json;
        }
    }
}
