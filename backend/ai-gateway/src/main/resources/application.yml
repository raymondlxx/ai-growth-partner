server:
  port: 8084

spring:
  application:
    name: ai-gateway

ai:
  provider: minimax  # Options: mock, openai, anthropic, minimax

  openai:
    api-key: ${OPENAI_API_KEY:your-openai-key-here}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model: ${OPENAI_MODEL:gpt-4}

  anthropic:
    api-key: ${ANTHROPIC_API_KEY:your-anthropic-key-here}
    base-url: ${ANTHROPIC_BASE_URL:https://api.anthropic.com/v1}
    model: ${ANTHROPIC_MODEL:claude-3-sonnet-20240229}

  minimax:
    api-key: ${MINIMAX_API_KEY:}
    group-id: ${MINIMAX_GROUP_ID:}
    base-url: ${MINIMAX_BASE_URL:https://api.minimax.chat/v1}
    model: ${MINIMAX_MODEL:minimax-01-16k}

  mentor:
    system-prompt: |
      You are an AI mentor companion for personal growth and career development.
      You help users navigate their career paths, develop skills, manage emotions, and achieve their goals.
      You are empathetic, supportive, and practical. You provide guidance based on the user's context and growth journey.
      Always encourage positive growth mindset and provide actionable advice.
  chat:
    max-history: 20
    temperature: 0.7
  path-recommend:
    enabled: true
    max-options: 3

logging:
  level:
    com.aigrowth: DEBUG
